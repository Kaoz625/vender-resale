<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vender Resale — Full product catalog. 3,019 DOCCS Directive 4911 compliant care package items for NY State facilities.">
  <meta property="og:title" content="Shop All Products — Vender Resale">
  <meta property="og:description" content="Browse 3,019 products: snacks, proteins, produce, hygiene, clothing, bedding, electronics and more.">
  <meta property="og:type" content="website">
  <title>Shop All Products — Vender Resale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #0b1628;
      --navy2: #111f38;
      --navy3: #1a2f50;
      --gold:  #c9a84c;
      --gold2: #e8c96a;
      --white: #ffffff;
      --muted: #8a9ab5;
      --text:  #d4dde8;
      --nav-h: 64px;
      --sticky-h: 108px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ─── NAV ─────────────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      height: var(--nav-h);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(11,22,40,0.92);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(201,168,76,0.18);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .nav-logo span { color: var(--gold); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.8rem;
    }
    .nav-links a {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--gold); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-cart {
      position: relative;
      display: flex;
      align-items: center;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      padding: 0.3rem;
    }
    .nav-cart:hover { color: var(--gold); }

    .cart-count {
      position: absolute;
      top: -4px;
      right: -6px;
      min-width: 17px;
      height: 17px;
      background: var(--gold);
      color: var(--navy);
      font-size: 0.62rem;
      font-weight: 700;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      line-height: 1;
    }
    .cart-count:empty { display: none; }

    .nav-cta {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--navy);
      background: var(--gold);
      padding: 0.5rem 1.1rem;
      border-radius: 2px;
      text-decoration: none;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .nav-cta:hover { background: var(--gold2); }

    /* ─── STICKY CONTROL BAR ──────────────────────────────────────── */
    .shop-controls {
      position: sticky;
      top: var(--nav-h);
      z-index: 200;
      background: rgba(11,22,40,0.96);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0.75rem 2rem;
    }

    .controls-inner {
      max-width: 1380px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* Search */
    .search-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 640px;
    }
    .search-wrap svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      flex-shrink: 0;
    }
    #search-input {
      width: 100%;
      background: var(--navy2);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 4px;
      padding: 0.6rem 0.85rem 0.6rem 2.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      transition: border-color 0.2s;
      outline: none;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: rgba(201,168,76,0.45); }

    .search-count {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-count strong { color: var(--gold); font-weight: 500; }

    /* Category pills */
    .pills-row {
      display: flex;
      gap: 0.45rem;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 2px;
    }
    .pills-row::-webkit-scrollbar { display: none; }

    .cat-pill {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      border-radius: 100px;
      padding: 0.38rem 0.9rem;
      font-size: 0.76rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      cursor: pointer;
      border: 1px solid rgba(138,154,181,0.25);
      background: var(--navy2);
      color: var(--muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      text-decoration: none;
      white-space: nowrap;
      -webkit-user-select: none;
      user-select: none;
    }
    .cat-pill:hover {
      border-color: rgba(201,168,76,0.35);
      color: var(--text);
    }
    .cat-pill.active {
      background: var(--gold);
      color: var(--navy);
      border-color: var(--gold);
      font-weight: 500;
    }

    /* ─── PAGE BODY ───────────────────────────────────────────────── */
    .shop-body {
      max-width: 1380px;
      margin: 0 auto;
      padding: 2rem 2rem 5rem;
    }

    /* ─── BACK LINK (filtered mode) ──────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }
    .back-link svg { flex-shrink: 0; }

    /* ─── SECTION ─────────────────────────────────────────────────── */
    .cat-section {
      margin-bottom: 3rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .section-title-group {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .section-emoji {
      font-size: 1.4rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .section-badge {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 100px;
      padding: 0.2rem 0.6rem;
      flex-shrink: 0;
    }

    .section-view-all {
      font-size: 0.8rem;
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .section-view-all:hover { color: var(--gold2); }

    /* ─── SUBCATEGORY FILTER CHIPS (filtered mode) ────────────────── */
    .subcat-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }

    .subcat-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      border-radius: 100px;
      padding: 0.32rem 0.8rem;
      font-size: 0.74rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1px solid rgba(138,154,181,0.22);
      background: transparent;
      color: var(--muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
      -webkit-user-select: none;
      user-select: none;
    }
    .subcat-chip:hover {
      border-color: rgba(201,168,76,0.35);
      color: var(--text);
    }
    .subcat-chip.active {
      background: rgba(201,168,76,0.12);
      color: var(--gold);
      border-color: rgba(201,168,76,0.5);
    }
    .subcat-chip .chip-count {
      font-size: 0.68rem;
      opacity: 0.7;
    }

    /* ─── PRODUCT GRID ────────────────────────────────────────────── */
    .prod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.1rem;
    }

    /* ─── PRODUCT CARD ────────────────────────────────────────────── */
    .prod-card {
      background: var(--navy2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    }
    .prod-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.28s ease;
      z-index: 1;
    }
    .prod-card:hover {
      transform: translateY(-2px);
      border-color: rgba(201,168,76,0.28);
      box-shadow: 0 8px 28px rgba(0,0,0,0.28);
    }
    .prod-card:hover::before { transform: scaleX(1); }

    .prod-img-wrap {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 4px 4px 0 0;
      background: var(--navy3);
    }
    .prod-img-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .prod-img-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: var(--navy3);
      color: var(--muted);
    }

    .prod-subcat {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(201,168,76,0.9);
      color: var(--navy);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 100px;
      letter-spacing: 0.03em;
      z-index: 2;
      max-width: calc(100% - 12px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .prod-info {
      padding: 0.7rem 0.75rem 0.8rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 0.4rem;
    }

    .prod-img-link { display: block; text-decoration: none; }
    .prod-name-link { text-decoration: none; display: block; }
    .prod-name-link:hover .prod-name { color: var(--gold); }
    .prod-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--white);
      line-height: 1.35;
      transition: color 0.15s;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.56em;
    }

    .prod-price {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }

    .prod-add-btn {
      width: 100%;
      margin-top: auto;
      padding: 0.48rem 0.5rem;
      background: transparent;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 3px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      text-transform: uppercase;
    }
    .prod-add-btn:hover {
      background: var(--gold);
      color: var(--navy);
      border-color: var(--gold);
    }

    /* ─── SKELETON CARDS ──────────────────────────────────────────── */
    .skel-card {
      background: var(--navy2);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      overflow: hidden;
    }
    .skel-img {
      aspect-ratio: 1 / 1;
      background: linear-gradient(90deg, var(--navy3) 25%, #223248 50%, var(--navy3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite linear;
    }
    .skel-body { padding: 0.7rem 0.75rem; }
    .skel-line {
      height: 12px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--navy3) 25%, #223248 50%, var(--navy3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite linear;
      margin-bottom: 0.5rem;
    }
    .skel-line.short { width: 55%; }
    .skel-line.med   { width: 75%; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── SECTION DIVIDER ─────────────────────────────────────────── */
    .section-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.18), transparent);
      margin-bottom: 3rem;
    }

    /* ─── SECTION FOOTER ──────────────────────────────────────────── */
    .section-footer {
      text-align: center;
      margin-top: 1.25rem;
    }

    /* ─── BUTTONS ─────────────────────────────────────────────────── */
    .btn-secondary {
      display: inline-block;
      background: none;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.6rem 1.4rem;
      border-radius: 2px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: rgba(201,168,76,0.08); }

    /* ─── FILTERED MODE HEADER ────────────────────────────────────── */
    .filtered-header {
      margin-bottom: 1.5rem;
    }
    .filtered-title-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
    }
    .filtered-emoji {
      font-size: 2rem;
      line-height: 1;
    }
    .filtered-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.15;
    }
    .filtered-sub {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .filtered-sub strong { color: var(--gold); font-weight: 500; }

    /* ─── PAGINATION ──────────────────────────────────────────────── */
    .pagination {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      margin-top: 2.5rem;
    }
    .pagination-info {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .pagination-controls {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .page-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 0.4rem;
      background: var(--navy2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-btn:hover:not(:disabled) {
      background: var(--navy3);
      border-color: rgba(201,168,76,0.3);
      color: var(--text);
    }
    .page-btn.active {
      background: rgba(201,168,76,0.12);
      border-color: var(--gold);
      color: var(--gold);
      font-weight: 500;
    }
    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .page-btn.ellipsis {
      background: none;
      border: none;
      color: var(--muted);
      cursor: default;
      pointer-events: none;
    }

    /* ─── NO RESULTS ──────────────────────────────────────────────── */
    .no-results {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .no-results h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--white);
      margin-bottom: 0.4rem;
    }

    /* ─── TOAST ───────────────────────────────────────────────────── */
    #vr-shop-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--navy2);
      color: var(--text);
      border: 1px solid var(--gold);
      border-radius: 5px;
      padding: 11px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.84rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.45);
      z-index: 9999;
      max-width: 300px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
    }
    #vr-shop-toast.show { opacity: 1; transform: translateY(0); }

    /* ─── FOOTER ──────────────────────────────────────────────────── */
    footer {
      background: #070f1d;
      padding: 2rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--white);
      text-decoration: none;
    }
    .footer-logo span { color: var(--gold); }
    .footer-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .footer-links a {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--gold); }
    .footer-copy {
      font-size: 0.72rem;
      color: rgba(138,154,181,0.5);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── RESPONSIVE ──────────────────────────────────────────────── */
    @media (max-width: 960px) {
      .prod-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .shop-controls { padding: 0.65rem 1.2rem; }
      .shop-body { padding: 1.5rem 1.2rem 4rem; }
    }

    @media (max-width: 560px) {
      nav { padding: 0 1.2rem; }
      .prod-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
      .section-title { font-size: 1.25rem; }
      .pagination-controls { gap: 0.2rem; }
      .page-btn { min-width: 32px; height: 32px; font-size: 0.78rem; }
      .footer-inner { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">Vender<span>Resale</span></a>
  <div class="nav-links">
    <a href="shop.html" class="active">Shop</a>
      <a href="directive.html">Directive 4911</a>
    <a href="/#how">How It Works</a>
    <a href="/#about">About</a>
  </div>
  <div class="nav-right">
    <a href="cart.html" class="nav-cart" aria-label="Cart">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="cart-count" id="cart-count-badge"></span>
    </a>
    <a href="cart.html" class="nav-cta">Order Now</a>
  </div>
</nav>

<!-- STICKY CONTROLS -->
<div class="shop-controls" id="shop-controls">
  <div class="controls-inner">
    <div class="search-row">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search 3,019 products..." autocomplete="off" aria-label="Search products">
      </div>
      <div class="search-count" id="search-count" aria-live="polite"></div>
    </div>
    <div class="pills-row" id="pills-row" role="navigation" aria-label="Category filter">
      <!-- Pills injected by JS -->
    </div>
  </div>
</div>

<!-- PAGE BODY -->
<div class="shop-body" id="shop-body">
  <!-- Browse or filtered content injected by JS -->
</div>

<footer>
  <div class="footer-inner">

      <a href="https://doccs.ny.gov/mail-packages" target="_blank" rel="noopener">DOCCS Package Rules</a>
      <a href="https://doccs.ny.gov/mail-packages" target="_blank" rel="noopener">DOCCS Package Info</a>
    </div>

  </div>
</footer>

<!-- TOAST -->
<div id="vr-shop-toast" role="status" aria-live="polite"></div>

<script src="/js/store.js"></script>
<script>
(function () {
  'use strict';

  // ─── TAXONOMY ─────────────────────────────────────────────────────────────
  var TAXONOMY = [
    { top: 'Proteins & Meat',        icon: '🥩', count: 761  },
    { top: 'Snacks',                  icon: '🍿', count: 510  },
    { top: 'Grocery',                 icon: '🛒', count: 993  },
    { top: 'Produce',                 icon: '🥦', count: 214  },
    { top: 'Hygiene & Personal Care', icon: '🧴', count: 173  },
    { top: 'Clothing',                icon: '👕', count: 155  },
    { top: 'Bedding & Home',          icon: '🛏', count: 53   },
    { top: 'Electronics',             icon: '🎧', count: 25   }
  ];

  // ─── SUBCATEGORY MAP ──────────────────────────────────────────────────────
  var SUBCATEGORY_MAP = {
    'Proteins & Meat':        ['Beef', 'Poultry', 'Pork', 'Seafood & Fish', 'Nuts & Seeds', 'Jerky & Meat Snacks'],
    'Snacks':                  ['Chips & Crisps', 'Cookies & Cakes', 'Candy & Sweets', 'Crackers', 'Popcorn', 'Other Snacks'],
    'Grocery':                 ['Bread & Bakery', 'Dairy & Cheese', 'Rice & Grains', 'Breakfast & Cereal', 'Beverages', 'Condiments & Sauces', 'Canned & Packaged Food', 'Soup'],
    'Produce':                 ['Fresh Vegetables', 'Fresh Fruit'],
    'Hygiene & Personal Care': ['Soap & Body Wash', 'Oral Care', 'Deodorant', 'Hair Care', 'Skin Care & Lotion', 'Feminine Care', 'Shaving'],
    'Clothing':                ['Sweatsuits & Sets', 'Shirts & Tops', 'Pants & Bottoms', 'Winter Gear', 'Socks & Underwear', 'Footwear'],
    'Bedding & Home':          ['Blankets & Bedding', 'Towels', 'Kitchen & Supplies'],
    'Electronics':             ['Headphones & Earbuds', 'Radios', 'Electronics Accessories'],
    'Other':                   ['Tobacco', 'Bundles', 'Books & Cards', 'Gift Cards']
  };

  var BROWSE_PER_SECTION  = 25;
  var FILTERED_PAGE_SIZE  = 48;

  // ─── STATE ────────────────────────────────────────────────────────────────
  // mode: 'browse' | 'top' | 'sub'
  var _catalog      = [];
  var _mode         = 'browse';
  var _activeTop    = null;   // top category name  (?top=)
  var _activeCat    = null;   // subcategory name    (?cat=)
  var _currentPage  = 1;
  var _searchQ      = '';
  var _searchTimer  = null;
  var _toastTimer   = null;

  // ─── HELPERS: find parent top for a given subcategory ────────────────────
  function getParentTop(subcat) {
    var tops = Object.keys(SUBCATEGORY_MAP);
    for (var i = 0; i < tops.length; i++) {
      var subs = SUBCATEGORY_MAP[tops[i]];
      for (var j = 0; j < subs.length; j++) {
        if (subs[j] === subcat) return tops[i];
      }
    }
    return null;
  }

  function getTaxEntry(topName) {
    for (var i = 0; i < TAXONOMY.length; i++) {
      if (TAXONOMY[i].top === topName) return TAXONOMY[i];
    }
    return null;
  }

  // ─── TOAST ────────────────────────────────────────────────────────────────
  function toast(msg) {
    var el = document.getElementById('vr-shop-toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function () { el.classList.remove('show'); }, 2600);
  }

  // ─── CART BADGE ───────────────────────────────────────────────────────────
  function updateCartBadge() {
    var count = VR.cart.count();
    var badge = document.getElementById('cart-count-badge');
    if (!badge) return;
    badge.textContent = count > 0 ? count : '';
  }

  // ─── HTML HELPERS ─────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  }

  function fmtPrice(p, pmax) {
    if (!p) return '';
    if (pmax && pmax !== p && pmax > p) return 'From ' + VR.formatPrice(p);
    return VR.formatPrice(p);
  }

  function backArrow() {
    return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>';
  }

  function fwdArrow() {
    return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }

  // ─── BUILD CARD HTML ──────────────────────────────────────────────────────
  function buildCard(product) {
    var img    = esc(product.image_url || (product.images && product.images[0]) || '');
    var name   = esc(product.name || '');
    var subcat = esc(product.category || '');
    var topcat = product.top_category || '';
    var price  = fmtPrice(product.price, product.price_max);
    var id     = product.id;

    var fallbackEmoji = '📦';
    var tax = getTaxEntry(topcat);
    if (tax) fallbackEmoji = tax.icon;

    var detailUrl = 'product.html?id=' + id;
    return [
      '<div class="prod-card" data-id="', id, '">',
        '<a href="', detailUrl, '" class="prod-img-link" tabindex="-1" aria-hidden="true">',
          '<div class="prod-img-wrap">',
            '<img src="', img, '" alt="', name, '" loading="lazy"',
              ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">',
            '<div class="prod-img-fallback" aria-hidden="true">', fallbackEmoji, '</div>',
            subcat ? '<span class="prod-subcat">' + subcat + '</span>' : '',
          '</div>',
        '</a>',
        '<div class="prod-info">',
          '<a href="', detailUrl, '" class="prod-name-link">',
            '<div class="prod-name">', name, '</div>',
          '</a>',
          '<div class="prod-price">', esc(price), '</div>',
          '<button class="prod-add-btn" type="button" data-id="', id,
            '" aria-label="Add ', name, ' to cart">Add to Cart</button>',
        '</div>',
      '</div>'
    ].join('');
  }

  // ─── BUILD SKELETON CARDS ─────────────────────────────────────────────────
  function buildSkeletons(n) {
    var html = '';
    for (var i = 0; i < n; i++) {
      html += [
        '<div class="skel-card">',
          '<div class="skel-img"></div>',
          '<div class="skel-body">',
            '<div class="skel-line med"></div>',
            '<div class="skel-line short"></div>',
            '<div class="skel-line" style="height:28px;margin-top:0.4rem;border-radius:3px;"></div>',
          '</div>',
        '</div>'
      ].join('');
    }
    return html;
  }

  // ─── SEARCH COUNT LABEL ───────────────────────────────────────────────────
  function updateSearchCount(visible) {
    var el = document.getElementById('search-count');
    if (!el) return;
    if (_searchQ) {
      el.innerHTML = '<strong>' + visible.toLocaleString() + '</strong> result' + (visible !== 1 ? 's' : '');
    } else {
      el.innerHTML = '<strong>3,019</strong> products';
    }
  }

  // ─── PILLS ────────────────────────────────────────────────────────────────
  // Mode 'browse'  → top-category pills (clicking navigates to ?top=X)
  // Mode 'top'     → subcategory pills for _activeTop (clicking navigates to ?cat=X)
  // Mode 'sub'     → sibling subcategory pills (active = current, clicking navigates to ?cat=X)
  function renderPills() {
    var row = document.getElementById('pills-row');
    if (!row) return;

    var html = '';

    if (_mode === 'browse') {
      // All top-category pills — none active (we're showing all)
      for (var i = 0; i < TAXONOMY.length; i++) {
        var t = TAXONOMY[i];
        html += '<a class="cat-pill" href="shop.html?top=' + encodeURIComponent(t.top) + '" role="button">' +
                  t.icon + ' ' + esc(t.top) +
                '</a>';
      }
    } else if (_mode === 'top') {
      // Subcategories of _activeTop
      var subs = SUBCATEGORY_MAP[_activeTop] || [];
      for (var si = 0; si < subs.length; si++) {
        html += '<a class="cat-pill" href="shop.html?cat=' + encodeURIComponent(subs[si]) + '" role="button">' +
                  esc(subs[si]) +
                '</a>';
      }
    } else if (_mode === 'sub') {
      // Sibling subcategories — active pill = _activeCat
      var parentTop = getParentTop(_activeCat);
      var siblings  = parentTop ? (SUBCATEGORY_MAP[parentTop] || []) : [];
      for (var bi = 0; bi < siblings.length; bi++) {
        var isActive = (siblings[bi] === _activeCat);
        html += '<a class="cat-pill' + (isActive ? ' active' : '') +
                '" href="shop.html?cat=' + encodeURIComponent(siblings[bi]) + '" role="button">' +
                  esc(siblings[bi]) +
                '</a>';
      }
    }

    row.innerHTML = html;
  }

  // ─── MODE 1 — BROWSE ALL ──────────────────────────────────────────────────
  function renderBrowseAll() {
    var body = document.getElementById('shop-body');
    if (!body) return;

    // Group catalog by top_category
    var groups = {};
    for (var i = 0; i < _catalog.length; i++) {
      var p = _catalog[i];
      var tc = p.top_category || 'Other';
      if (!groups[tc]) groups[tc] = [];
      groups[tc].push(p);
    }

    var searchQ     = _searchQ.toLowerCase();
    var totalVisible = 0;
    var html        = '';

    for (var ti = 0; ti < TAXONOMY.length; ti++) {
      var tax    = TAXONOMY[ti];
      var prods  = groups[tax.top] || [];

      var filtered = prods;
      if (searchQ) {
        filtered = prods.filter(function (p) {
          return (p.name        && p.name.toLowerCase().indexOf(searchQ) !== -1) ||
                 (p.description && p.description.toLowerCase().indexOf(searchQ) !== -1);
        });
      }

      if (filtered.length === 0) continue;
      totalVisible += filtered.length;

      var show   = filtered.slice(0, BROWSE_PER_SECTION);
      var topUrl = 'shop.html?top=' + encodeURIComponent(tax.top);

      html += '<section class="cat-section" id="section-' + esc(tax.top).replace(/\s+/g, '-').replace(/[&]/g, '') + '">';

      html += '<div class="section-header">';
      html += '<div class="section-title-group">';
      html += '<span class="section-emoji">' + tax.icon + '</span>';
      html += '<h2 class="section-title">' + esc(tax.top) + '</h2>';
      html += '<span class="section-badge">' + filtered.length.toLocaleString() + ' products</span>';
      html += '</div>';
      html += '<a href="' + topUrl + '" class="section-view-all">View all ' + fwdArrow() + '</a>';
      html += '</div>';

      html += '<div class="prod-grid">';
      for (var ci = 0; ci < show.length; ci++) html += buildCard(show[ci]);
      html += '</div>';

      if (filtered.length > BROWSE_PER_SECTION) {
        html += '<div class="section-footer">';
        html += '<a href="' + topUrl + '" class="btn-secondary">View all ' + filtered.length.toLocaleString() + ' ' + esc(tax.top) + ' products &rarr;</a>';
        html += '</div>';
      }

      html += '</section>';
      html += '<div class="section-divider"></div>';
    }

    if (!html) {
      html = '<div class="no-results"><h3>No products found</h3><p>Try a different search term.</p></div>';
    }

    body.innerHTML = html;
    updateSearchCount(totalVisible);
  }

  // ─── MODE 2 — TOP CATEGORY VIEW ───────────────────────────────────────────
  function renderTopCategory() {
    var body = document.getElementById('shop-body');
    if (!body) return;

    var tax = getTaxEntry(_activeTop);
    if (!tax) { _mode = 'browse'; renderBrowseAll(); return; }

    var subcats = SUBCATEGORY_MAP[_activeTop] || [];

    // Group products for this top category by subcategory
    var subGroups = {};
    for (var i = 0; i < _catalog.length; i++) {
      var p = _catalog[i];
      if (p.top_category !== _activeTop) continue;
      var sc = p.category || 'Other';
      if (!subGroups[sc]) subGroups[sc] = [];
      subGroups[sc].push(p);
    }

    var searchQ      = _searchQ.toLowerCase();
    var totalVisible = 0;
    var html         = '';

    // Back link → browse all
    html += '<a href="shop.html" class="back-link">' + backArrow() + ' All Categories</a>';

    // Page header
    html += '<div class="filtered-header">';
    html += '<div class="filtered-title-row">';
    html += '<span class="filtered-emoji">' + tax.icon + '</span>';
    html += '<h1 class="filtered-title">' + esc(tax.top) + '</h1>';
    html += '</div>';
    html += '</div>';

    // One section per subcategory
    // Use taxonomy-defined order; fall back to whatever is in subGroups
    var orderedSubs = subcats.length ? subcats : Object.keys(subGroups);

    for (var si = 0; si < orderedSubs.length; si++) {
      var subName = orderedSubs[si];
      var prods   = subGroups[subName] || [];

      var filtered = prods;
      if (searchQ) {
        filtered = prods.filter(function (p) {
          return (p.name        && p.name.toLowerCase().indexOf(searchQ) !== -1) ||
                 (p.description && p.description.toLowerCase().indexOf(searchQ) !== -1);
        });
      }

      if (filtered.length === 0) continue;
      totalVisible += filtered.length;

      var show   = filtered.slice(0, BROWSE_PER_SECTION);
      var catUrl = 'shop.html?cat=' + encodeURIComponent(subName);

      html += '<section class="cat-section" id="section-sub-' + esc(subName).replace(/\s+/g, '-').replace(/[&]/g, '') + '">';

      html += '<div class="section-header">';
      html += '<div class="section-title-group">';
      html += '<h2 class="section-title">' + esc(subName) + '</h2>';
      html += '<span class="section-badge">' + prods.length.toLocaleString() + ' products</span>';
      html += '</div>';
      html += '<a href="' + catUrl + '" class="section-view-all">View all ' + fwdArrow() + '</a>';
      html += '</div>';

      html += '<div class="prod-grid">';
      for (var ci = 0; ci < show.length; ci++) html += buildCard(show[ci]);
      html += '</div>';

      if (prods.length > BROWSE_PER_SECTION) {
        html += '<div class="section-footer">';
        html += '<a href="' + catUrl + '" class="btn-secondary">View all ' + prods.length.toLocaleString() + ' ' + esc(subName) + ' products &rarr;</a>';
        html += '</div>';
      }

      html += '</section>';
      html += '<div class="section-divider"></div>';
    }

    if (totalVisible === 0) {
      html += '<div class="no-results"><h3>No products found</h3><p>Try a different search term.</p></div>';
    }

    body.innerHTML = html;
    updateSearchCount(totalVisible);
  }

  // ─── MODE 3 — SUBCATEGORY ALL PRODUCTS ───────────────────────────────────
  function renderSubcategory() {
    var body = document.getElementById('shop-body');
    if (!body) return;

    var parentTop = getParentTop(_activeCat);
    var tax       = parentTop ? getTaxEntry(parentTop) : null;

    // All products in this subcategory
    var prods = _catalog.filter(function (p) {
      return p.category === _activeCat;
    });

    // Apply search
    var searchQ  = _searchQ.toLowerCase();
    var filtered = prods;
    if (searchQ) {
      filtered = prods.filter(function (p) {
        return (p.name        && p.name.toLowerCase().indexOf(searchQ) !== -1) ||
               (p.description && p.description.toLowerCase().indexOf(searchQ) !== -1);
      });
    }

    updateSearchCount(filtered.length);

    var total      = filtered.length;
    var totalPages = Math.max(1, Math.ceil(total / FILTERED_PAGE_SIZE));
    if (_currentPage > totalPages) _currentPage = 1;
    var start = (_currentPage - 1) * FILTERED_PAGE_SIZE;
    var end   = Math.min(start + FILTERED_PAGE_SIZE, total);
    var slice = filtered.slice(start, end);

    var html = '';

    // Back link → parent top category
    var backHref  = parentTop ? 'shop.html?top=' + encodeURIComponent(parentTop) : 'shop.html';
    var backLabel = parentTop ? (tax ? tax.icon + ' ' + esc(parentTop) : esc(parentTop)) : 'All Categories';
    html += '<a href="' + backHref + '" class="back-link">' + backArrow() + ' ' + backLabel + '</a>';

    // Page header
    html += '<div class="filtered-header">';
    html += '<div class="filtered-title-row">';
    if (tax) html += '<span class="filtered-emoji">' + tax.icon + '</span>';
    html += '<h1 class="filtered-title">' + esc(_activeCat) + '</h1>';
    html += '</div>';
    html += '<div class="filtered-sub">Showing <strong>' + filtered.length.toLocaleString() + '</strong> of <strong>' + prods.length.toLocaleString() + '</strong> products</div>';
    html += '</div>';

    // Product grid
    if (slice.length === 0) {
      html += '<div class="no-results"><h3>No products found</h3><p>Try adjusting your search.</p></div>';
    } else {
      html += '<div class="prod-grid" id="sub-grid">';
      for (var ci = 0; ci < slice.length; ci++) html += buildCard(slice[ci]);
      html += '</div>';
    }

    // Pagination
    if (totalPages > 1) {
      html += renderPaginationHTML(totalPages, total, start, end);
    }

    body.innerHTML = html;
  }

  // ─── PAGINATION HTML ──────────────────────────────────────────────────────
  function renderPaginationHTML(totalPages, total, start, end) {
    var html = '<div class="pagination" id="pagination">';
    html += '<div class="pagination-info">Showing ' + (start + 1).toLocaleString() + '&ndash;' + end.toLocaleString() + ' of ' + total.toLocaleString() + ' products</div>';
    html += '<div class="pagination-controls">';

    html += '<button class="page-btn" data-pgbtn="prev"' + (_currentPage <= 1 ? ' disabled' : '') + ' aria-label="Previous page">';
    html += '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>&nbsp;Prev</button>';

    var pages = buildPageList(_currentPage, totalPages);
    for (var pi = 0; pi < pages.length; pi++) {
      if (pages[pi] === '...') {
        html += '<button class="page-btn ellipsis" disabled aria-hidden="true">&hellip;</button>';
      } else {
        html += '<button class="page-btn' + (pages[pi] === _currentPage ? ' active' : '') + '" data-pgbtn="' + pages[pi] + '" aria-label="Page ' + pages[pi] + '"' + (pages[pi] === _currentPage ? ' aria-current="page"' : '') + '>' + pages[pi] + '</button>';
      }
    }

    html += '<button class="page-btn" data-pgbtn="next"' + (_currentPage >= totalPages ? ' disabled' : '') + ' aria-label="Next page">';
    html += 'Next&nbsp;<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>';

    html += '</div></div>';
    return html;
  }

  function buildPageList(current, total) {
    if (total <= 7) {
      var arr = [];
      for (var i = 1; i <= total; i++) arr.push(i);
      return arr;
    }
    var pages = [1];
    var left  = Math.max(2, current - 2);
    var right = Math.min(total - 1, current + 2);
    if (left > 2) pages.push('...');
    for (var pp = left; pp <= right; pp++) pages.push(pp);
    if (right < total - 1) pages.push('...');
    pages.push(total);
    return pages;
  }

  // ─── RENDER DISPATCH ──────────────────────────────────────────────────────
  function render() {
    if (_mode === 'sub') {
      renderSubcategory();
    } else if (_mode === 'top') {
      renderTopCategory();
    } else {
      renderBrowseAll();
    }
  }

  // ─── SKELETONS ────────────────────────────────────────────────────────────
  function renderBrowseSkeleton() {
    var body = document.getElementById('shop-body');
    if (!body) return;
    var html = '';
    for (var ti = 0; ti < TAXONOMY.length; ti++) {
      var tax = TAXONOMY[ti];
      html += '<section class="cat-section">';
      html += '<div class="section-header"><div class="section-title-group">';
      html += '<span class="section-emoji">' + tax.icon + '</span>';
      html += '<h2 class="section-title" style="color:var(--navy3);">' + esc(tax.top) + '</h2>';
      html += '</div></div>';
      html += '<div class="prod-grid">' + buildSkeletons(BROWSE_PER_SECTION) + '</div>';
      html += '</section><div class="section-divider"></div>';
    }
    body.innerHTML = html;
  }

  function renderTopSkeleton() {
    var body = document.getElementById('shop-body');
    if (!body) return;
    var tax  = getTaxEntry(_activeTop);
    var icon = tax ? tax.icon : '';
    var name = tax ? esc(_activeTop) : '';
    var html = '<a href="shop.html" class="back-link">' + backArrow() + ' All Categories</a>';
    html += '<div class="filtered-header"><div class="filtered-title-row">';
    if (icon) html += '<span class="filtered-emoji">' + icon + '</span>';
    html += '<h1 class="filtered-title" style="color:var(--navy3);">' + name + '</h1>';
    html += '</div></div>';
    var subs = SUBCATEGORY_MAP[_activeTop] || [];
    for (var i = 0; i < subs.length; i++) {
      html += '<section class="cat-section">';
      html += '<div class="section-header"><div class="section-title-group">';
      html += '<h2 class="section-title" style="color:var(--navy3);">' + esc(subs[i]) + '</h2>';
      html += '</div></div>';
      html += '<div class="prod-grid">' + buildSkeletons(8) + '</div>';
      html += '</section><div class="section-divider"></div>';
    }
    body.innerHTML = html;
  }

  function renderSubSkeleton() {
    var body = document.getElementById('shop-body');
    if (!body) return;
    body.innerHTML = '<div class="prod-grid">' + buildSkeletons(FILTERED_PAGE_SIZE) + '</div>';
  }

  // ─── PAGINATION CLICK ─────────────────────────────────────────────────────
  function onPaginationClick(e) {
    var btn = e.target.closest('[data-pgbtn]');
    if (!btn || btn.disabled) return;
    var val = btn.getAttribute('data-pgbtn');
    if (val === 'prev')       { _currentPage = Math.max(1, _currentPage - 1); }
    else if (val === 'next')  { _currentPage++; }
    else                      { _currentPage = parseInt(val, 10) || 1; }
    renderSubcategory();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── CART ADD (delegated) ─────────────────────────────────────────────────
  function onCartAdd(e) {
    var btn = e.target.closest('.prod-add-btn');
    if (!btn) return;
    var id = parseInt(btn.getAttribute('data-id'), 10);
    if (isNaN(id)) return;
    VR.getProduct(id).then(function (product) {
      if (!product) return;
      VR.cart.add(product, 1, null);
      toast('Added to cart!');
    });
  }

  // ─── SEARCH ───────────────────────────────────────────────────────────────
  function onSearchInput(e) {
    var val = e.target.value;
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(function () {
      _searchQ     = val.trim();
      _currentPage = 1;
      render();
    }, 300);
  }

  // ─── READ URL PARAMS ──────────────────────────────────────────────────────
  // ?top=X  → Mode 2 (top category view)
  // ?cat=X  → Mode 3 (subcategory all products)
  // (none)  → Mode 1 (browse all)
  function readParams() {
    var params = new URLSearchParams(window.location.search);
    var top    = params.get('top');
    var cat    = params.get('cat');

    if (cat) {
      _mode      = 'sub';
      _activeCat = decodeURIComponent(cat);
      _activeTop = getParentTop(_activeCat);
    } else if (top) {
      _mode      = 'top';
      _activeTop = decodeURIComponent(top);
      _activeCat = null;
    } else {
      _mode      = 'browse';
      _activeTop = null;
      _activeCat = null;
    }

    _currentPage = parseInt(params.get('page') || '1', 10) || 1;
  }

  // ─── BIND EVENTS ──────────────────────────────────────────────────────────
  function bindEvents() {
    var searchEl = document.getElementById('search-input');
    if (searchEl) searchEl.addEventListener('input', onSearchInput);

    var shopBody = document.getElementById('shop-body');
    if (shopBody) {
      shopBody.addEventListener('click', function (e) {
        onCartAdd(e);
        if (_mode === 'sub') onPaginationClick(e);
      });
    }
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    readParams();
    renderPills();
    bindEvents();

    VR.cart.onChange(updateCartBadge);
    updateCartBadge();

    // Show skeleton while catalog loads
    if (_mode === 'sub') {
      renderSubSkeleton();
    } else if (_mode === 'top') {
      renderTopSkeleton();
    } else {
      renderBrowseSkeleton();
    }

    VR.getCatalog()
      .then(function (catalog) {
        _catalog = catalog;
        render();
      })
      .catch(function (err) {
        var body = document.getElementById('shop-body');
        if (body) {
          body.innerHTML = '<div class="no-results"><h3>Failed to load catalog</h3><p>Please refresh the page.</p></div>';
        }
        console.error('Catalog load error:', err);
      });
  });

}());
</script>
</body>
</html>
